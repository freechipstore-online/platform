<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wafer/Die Viewer - FreeChipStore</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050508; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; }
  #app { display: grid; grid-template-columns: 1fr 280px; grid-template-rows: 44px 1fr; height: 100vh; }
  header { grid-column: 1 / -1; background: #0a0a0f; border-bottom: 1px solid #1a1a2a; display: flex; align-items: center; padding: 0 16px; gap: 12px; }
  header h1 { font-size: 15px; color: #ef4444; }
  header .breadcrumb { font-size: 12px; color: #555; }
  header .breadcrumb span { cursor: pointer; color: #888; }
  header .breadcrumb span:hover { color: #ef4444; }
  header .breadcrumb .active { color: #ef4444; }
  canvas { display: block; cursor: crosshair; }
  #sidebar { background: #0a0a0f; border-left: 1px solid #1a1a2a; padding: 12px; overflow-y: auto; }
  .info-section { margin-bottom: 16px; }
  .info-section h3 { font-size: 11px; color: #ef4444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #1a1a2a; padding-bottom: 4px; }
  .info-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; }
  .info-row .label { color: #666; }
  .info-row .value { color: #ccc; }
  .zoom-controls { display: flex; gap: 4px; margin-top: 8px; }
  .zoom-controls button { flex: 1; background: #111; border: 1px solid #222; color: #ccc; padding: 6px; cursor: pointer; font-family: inherit; font-size: 12px; border-radius: 3px; }
  .zoom-controls button:hover { border-color: #ef4444; }
  .legend { margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; margin: 3px 0; }
  .legend-color { width: 12px; height: 12px; border-radius: 2px; }
  .help { font-size: 10px; color: #444; margin-top: 16px; line-height: 1.5; }
  .crosshair { position: fixed; pointer-events: none; z-index: 10; }
</style>
<meta name="description" content="Zoom from 300mm silicon wafer → die → standard cells → transistor cross-section. Yield simulation. Electron microscope feel.">
<meta property="og:title" content="Wafer/Die Viewer - FreeChipStore">
<meta property="og:description" content="Zoom from 300mm silicon wafer → die → standard cells → transistor cross-section. Yield simulation. Electron microscope feel.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://freechipstore.pages.dev/items/wafer-viewer/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Wafer/Die Viewer">
<meta name="twitter:description" content="Zoom from 300mm silicon wafer → die → standard cells → transistor cross-section. Yield simulation. Electron microscope feel.">
<link rel="canonical" href="https://freechipstore.pages.dev/items/wafer-viewer/">
</head>
<body>
<div id="app">
  <header>
    <h1>Wafer/Die Viewer</h1>
    <div class="breadcrumb" id="breadcrumb">
      <span class="active" data-level="0">Wafer</span>
    </div>
  </header>
  <canvas id="viewer"></canvas>
  <div id="sidebar">
    <div class="info-section">
      <h3>Current View</h3>
      <div id="view-info"></div>
    </div>
    <div class="info-section">
      <h3>Statistics</h3>
      <div id="stats-info"></div>
    </div>
    <div class="zoom-controls">
      <button id="btn-back">Back</button>
      <button id="btn-zoom-in">Zoom In</button>
      <button id="btn-zoom-out">Zoom Out</button>
    </div>
    <div class="info-section legend" id="legend-section"></div>
    <div class="help">
      Scroll to zoom. Click to drill down.<br>
      Levels: Wafer > Die > Standard Cells > Transistor
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('viewer');
const ctx = canvas.getContext('2d');

// --- State ---
let zoomLevel = 0; // 0=wafer, 1=die, 2=cells, 3=transistor
let selectedDie = null;
let selectedBlock = null;
let selectedCell = null;
let hoverX = 0, hoverY = 0;
let panX = 0, panY = 0;
let zoom = 1;
let dragging = false;
let dragStartX, dragStartY, panStartX, panStartY;

// Seeded RNG for consistency
let seed = 42;
function rng() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

// --- Wafer data ---
const WAFER_RADIUS = 150; // mm (300mm wafer)
const DIE_W = 20, DIE_H = 15; // mm
const dies = [];
function initWafer() {
  seed = 42;
  dies.length = 0;
  for (let y = -WAFER_RADIUS; y < WAFER_RADIUS; y += DIE_H) {
    for (let x = -WAFER_RADIUS; x < WAFER_RADIUS; x += DIE_W) {
      const cx = x + DIE_W / 2, cy = y + DIE_H / 2;
      const dist = Math.sqrt(cx * cx + cy * cy);
      if (dist + Math.max(DIE_W, DIE_H) / 2 < WAFER_RADIUS * 0.95) {
        const edgeDist = WAFER_RADIUS - dist;
        const defectChance = edgeDist < 30 ? 0.15 : 0.03;
        dies.push({
          x, y, w: DIE_W, h: DIE_H,
          good: rng() > defectChance,
          id: dies.length,
        });
      }
    }
  }
}

// --- Die blocks ---
const DIE_BLOCKS = [
  { name: 'CPU Core 0', x: 0.02, y: 0.02, w: 0.28, h: 0.45, color: '#2a3a5a' },
  { name: 'CPU Core 1', x: 0.02, y: 0.5, w: 0.28, h: 0.45, color: '#2a3a5a' },
  { name: 'L2 Cache', x: 0.32, y: 0.02, w: 0.35, h: 0.55, color: '#1a4a3a' },
  { name: 'L3 Cache', x: 0.32, y: 0.6, w: 0.35, h: 0.38, color: '#1a5a4a' },
  { name: 'Memory Ctrl', x: 0.7, y: 0.02, w: 0.28, h: 0.3, color: '#4a2a3a' },
  { name: 'PCIe I/O', x: 0.7, y: 0.35, w: 0.28, h: 0.25, color: '#3a3a2a' },
  { name: 'Power Mgmt', x: 0.7, y: 0.63, w: 0.28, h: 0.17, color: '#3a2a4a' },
  { name: 'PHY Layer', x: 0.7, y: 0.82, w: 0.28, h: 0.16, color: '#2a2a3a' },
];

// --- Standard cell patterns ---
const GATE_TYPES = ['INV', 'NAND', 'NOR', 'BUF', 'XOR', 'MUX', 'FF'];

function generateCells(blockIdx) {
  seed = 100 + blockIdx * 37;
  const cells = [];
  const rows = 12, cols = 16;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      cells.push({
        row: r, col: c,
        type: GATE_TYPES[Math.floor(rng() * GATE_TYPES.length)],
        inputs: 2 + Math.floor(rng() * 2),
        used: rng() > 0.1,
      });
    }
  }
  return cells;
}

// --- Resize ---
function resize() {
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth;
  canvas.height = window.innerHeight - 44;
}

// --- Drawing: Wafer ---
function drawWafer() {
  const cx = canvas.width / 2 + panX;
  const cy = canvas.height / 2 + panY;
  const scale = Math.min(canvas.width, canvas.height) / (WAFER_RADIUS * 2.4) * zoom;

  // Wafer background
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, WAFER_RADIUS * scale, 0, Math.PI * 2);
  ctx.fillStyle = '#0c0c14';
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Flat notch
  ctx.beginPath();
  ctx.moveTo(cx - 15 * scale, cy + WAFER_RADIUS * scale);
  ctx.lineTo(cx + 15 * scale, cy + WAFER_RADIUS * scale);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Dies
  dies.forEach((die, i) => {
    const dx = cx + die.x * scale;
    const dy = cy + die.y * scale;
    const dw = die.w * scale;
    const dh = die.h * scale;

    if (dx + dw < 0 || dx > canvas.width || dy + dh < 0 || dy > canvas.height) return;

    ctx.fillStyle = die.good ? '#0e1420' : '#200808';
    ctx.fillRect(dx, dy, dw - 1, dh - 1);
    ctx.strokeStyle = die.good ? '#1a2840' : '#401010';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(dx, dy, dw - 1, dh - 1);

    if (!die.good && dw > 15) {
      ctx.strokeStyle = '#ef444480';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dx + 2, dy + 2);
      ctx.lineTo(dx + dw - 3, dy + dh - 3);
      ctx.moveTo(dx + dw - 3, dy + 2);
      ctx.lineTo(dx + 2, dy + dh - 3);
      ctx.stroke();
    }

    // Hover highlight
    if (die.good) {
      const mx = hoverX, my = hoverY;
      if (mx >= dx && mx < dx + dw && my >= dy && my < dy + dh) {
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 2;
        ctx.strokeRect(dx, dy, dw - 1, dh - 1);
      }
    }
  });

  // Grid lines (light)
  ctx.strokeStyle = '#0a0a1a';
  ctx.lineWidth = 0.3;
  for (let x = -WAFER_RADIUS; x < WAFER_RADIUS; x += DIE_W) {
    ctx.beginPath();
    ctx.moveTo(cx + x * scale, cy - WAFER_RADIUS * scale);
    ctx.lineTo(cx + x * scale, cy + WAFER_RADIUS * scale);
    ctx.stroke();
  }

  ctx.restore();
}

// --- Drawing: Die ---
function drawDie() {
  const margin = 40;
  const dieW = canvas.width - margin * 2;
  const dieH = canvas.height - margin * 2;
  const scale = Math.min(dieW, dieH);
  const ox = (canvas.width - scale) / 2 + panX;
  const oy = (canvas.height - scale) / 2 + panY;

  // Die outline
  ctx.fillStyle = '#080810';
  ctx.fillRect(ox, oy, scale, scale * 0.75);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.strokeRect(ox, oy, scale, scale * 0.75);

  // Bond pads around edge
  const padSize = 4 * zoom;
  ctx.fillStyle = '#888';
  for (let i = 0; i < 40; i++) {
    ctx.fillRect(ox + (i / 40) * scale + 2, oy - padSize - 1, padSize, padSize);
    ctx.fillRect(ox + (i / 40) * scale + 2, oy + scale * 0.75 + 1, padSize, padSize);
  }
  for (let i = 0; i < 30; i++) {
    ctx.fillRect(ox - padSize - 1, oy + (i / 30) * scale * 0.75 + 2, padSize, padSize);
    ctx.fillRect(ox + scale + 1, oy + (i / 30) * scale * 0.75 + 2, padSize, padSize);
  }

  // Blocks
  DIE_BLOCKS.forEach((block, idx) => {
    const bx = ox + block.x * scale;
    const by = oy + block.y * scale * 0.75;
    const bw = block.w * scale;
    const bh = block.h * scale * 0.75;

    ctx.fillStyle = block.color;
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);

    // Internal structure hints
    seed = 200 + idx * 13;
    ctx.fillStyle = block.color.replace(/[0-9a-f]{2}$/i, m => {
      const v = Math.min(255, parseInt(m, 16) + 20);
      return v.toString(16).padStart(2, '0');
    });
    if (block.name.includes('Cache')) {
      // SRAM array pattern
      const cellW = bw / 32, cellH = bh / 24;
      for (let r = 0; r < 24; r++) {
        for (let c = 0; c < 32; c++) {
          if ((r + c) % 3 === 0) {
            ctx.fillRect(bx + c * cellW + 0.5, by + r * cellH + 0.5, cellW - 1, cellH - 1);
          }
        }
      }
    } else if (block.name.includes('Core')) {
      // Logic array pattern
      for (let i = 0; i < 50; i++) {
        const rx = bx + rng() * bw;
        const ry = by + rng() * bh;
        ctx.fillRect(rx, ry, rng() * 8 + 2, rng() * 4 + 1);
      }
    }

    // Label
    if (bw > 40 && bh > 20) {
      ctx.fillStyle = '#aaa';
      ctx.font = `${Math.min(12, bw / block.name.length * 1.2)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText(block.name, bx + bw / 2, by + bh / 2 + 4);
    }

    // Hover
    if (hoverX >= bx && hoverX < bx + bw && hoverY >= by && hoverY < by + bh) {
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, bw, bh);
    }
  });
}

// --- Drawing: Standard Cells ---
function drawCells() {
  const blockIdx = selectedBlock || 0;
  const cells = generateCells(blockIdx);
  const rows = 12, cols = 16;
  const margin = 50;
  const cellW = (canvas.width - margin * 2) / cols;
  const cellH = (canvas.height - margin * 2) / rows;
  const ox = margin + panX;
  const oy = margin + panY;

  // Background
  ctx.fillStyle = '#060610';
  ctx.fillRect(ox - 10, oy - 10, cols * cellW + 20, rows * cellH + 20);

  // Power rails
  for (let r = 0; r <= rows; r++) {
    ctx.strokeStyle = r % 2 === 0 ? '#442222' : '#222244';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ox - 10, oy + r * cellH);
    ctx.lineTo(ox + cols * cellW + 10, oy + r * cellH);
    ctx.stroke();

    if (r < rows) {
      ctx.fillStyle = '#333';
      ctx.font = '8px Courier New';
      ctx.textAlign = 'right';
      ctx.fillText(r % 2 === 0 ? 'VDD' : 'GND', ox - 14, oy + r * cellH + cellH / 2 + 3);
    }
  }

  // Cells
  cells.forEach(cell => {
    const cx = ox + cell.col * cellW;
    const cy = oy + cell.row * cellH;

    if (!cell.used) {
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(cx + 1, cy + 1, cellW - 2, cellH - 2);
      return;
    }

    // Gate body
    const gateColors = {
      'INV': '#1a2a4a', 'NAND': '#2a1a3a', 'NOR': '#1a3a2a',
      'BUF': '#2a2a1a', 'XOR': '#3a1a2a', 'MUX': '#1a2a3a', 'FF': '#2a3a1a',
    };
    ctx.fillStyle = gateColors[cell.type] || '#1a1a2a';
    ctx.fillRect(cx + 1, cy + 1, cellW - 2, cellH - 2);

    // Gate symbol
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    const gcx = cx + cellW / 2, gcy = cy + cellH / 2;
    const gw = cellW * 0.4, gh = cellH * 0.5;

    if (cell.type === 'INV') {
      ctx.beginPath();
      ctx.moveTo(gcx - gw / 2, gcy - gh / 2);
      ctx.lineTo(gcx + gw / 2, gcy);
      ctx.lineTo(gcx - gw / 2, gcy + gh / 2);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(gcx + gw / 2 + 3, gcy, 3, 0, Math.PI * 2);
      ctx.stroke();
    } else if (cell.type === 'NAND' || cell.type === 'NOR') {
      ctx.beginPath();
      ctx.moveTo(gcx - gw / 2, gcy - gh / 2);
      ctx.lineTo(gcx, gcy - gh / 2);
      ctx.quadraticCurveTo(gcx + gw / 2 + 4, gcy, gcx, gcy + gh / 2);
      ctx.lineTo(gcx - gw / 2, gcy + gh / 2);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(gcx + gw / 2 + 2, gcy, 2, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.strokeRect(gcx - gw / 2, gcy - gh / 2, gw, gh);
    }

    // Routing channels (metal lines)
    seed = cell.row * 100 + cell.col;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < cell.inputs; i++) {
      ctx.beginPath();
      ctx.moveTo(cx, cy + (i + 1) * cellH / (cell.inputs + 1));
      ctx.lineTo(cx + cellW * 0.3, cy + (i + 1) * cellH / (cell.inputs + 1));
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(cx + cellW * 0.7, cy + cellH / 2);
    ctx.lineTo(cx + cellW, cy + cellH / 2);
    ctx.stroke();

    // Label
    if (cellW > 30) {
      ctx.fillStyle = '#555';
      ctx.font = `${Math.min(9, cellW / 5)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText(cell.type, gcx, cy + cellH - 4);
    }

    // Hover
    if (hoverX >= cx && hoverX < cx + cellW && hoverY >= cy && hoverY < cy + cellH) {
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 2;
      ctx.strokeRect(cx + 1, cy + 1, cellW - 2, cellH - 2);
    }
  });
}

// --- Drawing: Transistor ---
function drawTransistor() {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2 + panX, cy = h / 2 + panY;
  const scale = Math.min(w, h) * 0.6 * zoom;

  // Substrate
  const subTop = cy + scale * 0.1;
  const subBot = cy + scale * 0.45;
  ctx.fillStyle = '#1a1520';
  ctx.fillRect(cx - scale * 0.5, subTop, scale, subBot - subTop);
  ctx.fillStyle = '#888';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('P-type Silicon Substrate', cx, subBot + 16);

  // Source/Drain regions (n+)
  const regionW = scale * 0.18;
  const regionH = scale * 0.15;
  const regionTop = subTop;

  // Source
  ctx.fillStyle = '#1a2a4a';
  ctx.fillRect(cx - scale * 0.35, regionTop, regionW, regionH);
  ctx.strokeStyle = '#3366aa';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - scale * 0.35, regionTop, regionW, regionH);
  ctx.fillStyle = '#6688cc';
  ctx.font = '10px Courier New';
  ctx.fillText('n+ Source', cx - scale * 0.35 + regionW / 2, regionTop + regionH / 2 + 4);

  // Drain
  ctx.fillStyle = '#1a2a4a';
  ctx.fillRect(cx + scale * 0.17, regionTop, regionW, regionH);
  ctx.strokeStyle = '#3366aa';
  ctx.strokeRect(cx + scale * 0.17, regionTop, regionW, regionH);
  ctx.fillStyle = '#6688cc';
  ctx.fillText('n+ Drain', cx + scale * 0.17 + regionW / 2, regionTop + regionH / 2 + 4);

  // Channel
  ctx.fillStyle = '#221a30';
  ctx.fillRect(cx - scale * 0.17, regionTop, scale * 0.34, regionH * 0.4);
  ctx.fillStyle = '#9966cc';
  ctx.font = '9px Courier New';
  ctx.fillText('Channel', cx, regionTop + regionH * 0.25);

  // Gate oxide
  const oxideTop = regionTop - scale * 0.03;
  ctx.fillStyle = '#2a2a1a';
  ctx.fillRect(cx - scale * 0.17, oxideTop, scale * 0.34, scale * 0.03);
  ctx.strokeStyle = '#665522';
  ctx.strokeRect(cx - scale * 0.17, oxideTop, scale * 0.34, scale * 0.03);
  ctx.fillStyle = '#aa8844';
  ctx.font = '8px Courier New';
  ctx.fillText('SiO2 (Gate Oxide)', cx, oxideTop - 2);

  // Gate (polysilicon)
  const gateTop = oxideTop - scale * 0.1;
  ctx.fillStyle = '#3a1a1a';
  ctx.fillRect(cx - scale * 0.12, gateTop, scale * 0.24, scale * 0.1);
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - scale * 0.12, gateTop, scale * 0.24, scale * 0.1);
  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 11px Courier New';
  ctx.fillText('Gate (Poly-Si)', cx, gateTop + scale * 0.06);

  // Metal contacts
  ctx.fillStyle = '#666';
  // Source contact
  ctx.fillRect(cx - scale * 0.28, gateTop - scale * 0.15, scale * 0.04, scale * 0.15 + regionTop - gateTop + regionH * 0.5);
  ctx.fillText('S', cx - scale * 0.26, gateTop - scale * 0.18);
  // Drain contact
  ctx.fillRect(cx + scale * 0.24, gateTop - scale * 0.15, scale * 0.04, scale * 0.15 + regionTop - gateTop + regionH * 0.5);
  ctx.fillText('D', cx + scale * 0.26, gateTop - scale * 0.18);
  // Gate contact
  ctx.fillRect(cx - scale * 0.02, gateTop - scale * 0.12, scale * 0.04, scale * 0.12);
  ctx.fillText('G', cx, gateTop - scale * 0.14);

  // Depletion region (dashed)
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#9966cc44';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, regionTop + regionH * 0.5, scale * 0.2, scale * 0.1, 0, 0, Math.PI);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#664488';
  ctx.font = '9px Courier New';
  ctx.fillText('Depletion Region', cx, regionTop + regionH * 0.7);

  // Dimensions
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  const dimY = subBot + 30;
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.17, dimY);
  ctx.lineTo(cx + scale * 0.17, dimY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.17, dimY - 4);
  ctx.lineTo(cx - scale * 0.17, dimY + 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + scale * 0.17, dimY - 4);
  ctx.lineTo(cx + scale * 0.17, dimY + 4);
  ctx.stroke();
  ctx.fillStyle = '#888';
  ctx.font = '10px Courier New';
  ctx.fillText('Gate Length: 5nm', cx, dimY + 14);

  // Scale bar
  ctx.fillStyle = '#333';
  ctx.font = '9px Courier New';
  ctx.fillText('MOSFET Cross-Section (not to scale)', cx, cy - scale * 0.4);
}

// --- Drawing: Main ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Vignette
  const grad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width * 0.7);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, '#000000aa');

  if (zoomLevel === 0) drawWafer();
  else if (zoomLevel === 1) drawDie();
  else if (zoomLevel === 2) drawCells();
  else if (zoomLevel === 3) drawTransistor();

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Crosshair
  ctx.strokeStyle = '#ef444440';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(hoverX, 0);
  ctx.lineTo(hoverX, canvas.height);
  ctx.moveTo(0, hoverY);
  ctx.lineTo(canvas.width, hoverY);
  ctx.stroke();

  // Coordinate display
  ctx.fillStyle = '#333';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`${Math.round(hoverX)}, ${Math.round(hoverY)}`, 8, canvas.height - 8);
}

// --- Sidebar ---
function updateSidebar() {
  const viewInfo = document.getElementById('view-info');
  const statsInfo = document.getElementById('stats-info');
  const legendSection = document.getElementById('legend-section');
  const breadcrumb = document.getElementById('breadcrumb');

  const levels = ['Wafer', 'Die', 'Standard Cells', 'Transistor'];
  let bc = '';
  for (let i = 0; i <= zoomLevel; i++) {
    const label = i === 1 && selectedDie !== null ? `Die #${selectedDie}` :
                  i === 2 && selectedBlock !== null ? DIE_BLOCKS[selectedBlock].name :
                  levels[i];
    bc += `<span data-level="${i}" class="${i === zoomLevel ? 'active' : ''}">${label}</span>`;
    if (i < zoomLevel) bc += ' > ';
  }
  breadcrumb.innerHTML = bc;
  breadcrumb.querySelectorAll('span').forEach(s => {
    s.addEventListener('click', () => {
      const lvl = parseInt(s.dataset.level);
      if (lvl < zoomLevel) {
        zoomLevel = lvl;
        panX = panY = 0;
        zoom = 1;
        updateSidebar();
      }
    });
  });

  if (zoomLevel === 0) {
    const goodDies = dies.filter(d => d.good).length;
    viewInfo.innerHTML = infoRow('Level', 'Wafer') + infoRow('Diameter', '300mm') + infoRow('Technology', '5nm FinFET');
    statsInfo.innerHTML = infoRow('Total Dies', dies.length) + infoRow('Good Dies', goodDies) +
      infoRow('Defective', dies.length - goodDies) + infoRow('Yield', (goodDies / dies.length * 100).toFixed(1) + '%') +
      infoRow('Die Size', `${DIE_W}x${DIE_H}mm`);
    legendSection.innerHTML = '<h3>Legend</h3>' +
      legendItem('#0e1420', 'Good Die') + legendItem('#200808', 'Defective Die');
  } else if (zoomLevel === 1) {
    viewInfo.innerHTML = infoRow('Level', 'Die Layout') + infoRow('Die #', selectedDie) + infoRow('Node', '5nm');
    statsInfo.innerHTML = infoRow('Transistors', '~12.5B') + infoRow('Die Area', `${DIE_W * DIE_H}mm^2`) +
      infoRow('Blocks', DIE_BLOCKS.length) + infoRow('Metal Layers', '15');
    legendSection.innerHTML = '<h3>Blocks</h3>' + DIE_BLOCKS.map(b => legendItem(b.color, b.name)).join('');
  } else if (zoomLevel === 2) {
    viewInfo.innerHTML = infoRow('Level', 'Standard Cells') + infoRow('Block', DIE_BLOCKS[selectedBlock || 0].name);
    statsInfo.innerHTML = infoRow('Cell Rows', 12) + infoRow('Cells/Row', 16) +
      infoRow('Cell Height', '7.5T') + infoRow('Min Width', '1 CPP');
    legendSection.innerHTML = '<h3>Gate Types</h3>' +
      legendItem('#1a2a4a', 'INV') + legendItem('#2a1a3a', 'NAND') +
      legendItem('#1a3a2a', 'NOR') + legendItem('#2a2a1a', 'BUF') +
      legendItem('#3a1a2a', 'XOR') + legendItem('#1a2a3a', 'MUX') + legendItem('#2a3a1a', 'FF');
  } else {
    viewInfo.innerHTML = infoRow('Level', 'Transistor') + infoRow('Type', 'N-MOSFET');
    statsInfo.innerHTML = infoRow('Gate Length', '5nm') + infoRow('Fin Height', '48nm') +
      infoRow('Oxide', 'HfO2 (high-k)') + infoRow('Vth', '~0.2V') +
      infoRow('Channel', 'Strained Si');
    legendSection.innerHTML = '<h3>Materials</h3>' +
      legendItem('#3a1a1a', 'Polysilicon Gate') + legendItem('#2a2a1a', 'SiO2 Oxide') +
      legendItem('#1a2a4a', 'n+ Doped Si') + legendItem('#1a1520', 'p-type Substrate') +
      legendItem('#664488', 'Depletion Region');
  }
}

function infoRow(label, value) {
  return `<div class="info-row"><span class="label">${label}</span><span class="value">${value}</span></div>`;
}

function legendItem(color, label) {
  return `<div class="legend-item"><span class="legend-color" style="background:${color}"></span>${label}</div>`;
}

// --- Interaction ---
canvas.addEventListener('mousemove', e => {
  hoverX = e.clientX - canvas.getBoundingClientRect().left;
  hoverY = e.clientY - canvas.getBoundingClientRect().top;
  if (dragging) {
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
  }
});

canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
});

canvas.addEventListener('mouseup', e => {
  const dx = Math.abs(e.clientX - dragStartX);
  const dy = Math.abs(e.clientY - dragStartY);
  dragging = false;
  if (dx > 5 || dy > 5) return; // was a drag, not a click

  // Click to drill down
  if (zoomLevel === 0) {
    const cx = canvas.width / 2 + panX;
    const cy = canvas.height / 2 + panY;
    const scale = Math.min(canvas.width, canvas.height) / (WAFER_RADIUS * 2.4) * zoom;
    for (const die of dies) {
      if (!die.good) continue;
      const dx = cx + die.x * scale;
      const dy = cy + die.y * scale;
      if (hoverX >= dx && hoverX < dx + die.w * scale && hoverY >= dy && hoverY < dy + die.h * scale) {
        selectedDie = die.id;
        zoomLevel = 1;
        panX = panY = 0;
        zoom = 1;
        updateSidebar();
        return;
      }
    }
  } else if (zoomLevel === 1) {
    const margin = 40;
    const scale = Math.min(canvas.width - margin * 2, canvas.height - margin * 2);
    const ox = (canvas.width - scale) / 2 + panX;
    const oy = (canvas.height - scale) / 2 + panY;
    for (let i = 0; i < DIE_BLOCKS.length; i++) {
      const b = DIE_BLOCKS[i];
      const bx = ox + b.x * scale;
      const by = oy + b.y * scale * 0.75;
      const bw = b.w * scale;
      const bh = b.h * scale * 0.75;
      if (hoverX >= bx && hoverX < bx + bw && hoverY >= by && hoverY < by + bh) {
        selectedBlock = i;
        zoomLevel = 2;
        panX = panY = 0;
        zoom = 1;
        updateSidebar();
        return;
      }
    }
  } else if (zoomLevel === 2) {
    zoomLevel = 3;
    panX = panY = 0;
    zoom = 1;
    updateSidebar();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.3, Math.min(5, zoom * factor));
}, { passive: false });

document.getElementById('btn-back').addEventListener('click', () => {
  if (zoomLevel > 0) {
    zoomLevel--;
    panX = panY = 0;
    zoom = 1;
    updateSidebar();
  }
});

document.getElementById('btn-zoom-in').addEventListener('click', () => { zoom = Math.min(5, zoom * 1.3); });
document.getElementById('btn-zoom-out').addEventListener('click', () => { zoom = Math.max(0.3, zoom / 1.3); });

window.addEventListener('resize', resize);

// --- Init ---
initWafer();
resize();
updateSidebar();

function loop() {
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
<script src="/related.js"></script>
